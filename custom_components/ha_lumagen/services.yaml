show_osd_message:
  name: Show OSD message
  description: Show an OSD message on the Lumagen.
  fields:
    line_one:
      name: Line one
      description: First line of text (up to 30 chars).
      required: true
      example: "Hello World"
      selector:
        text:
    line_two:
      name: Line two
      description: Second line of text (up to 30 chars).
      example: "Second line"
      selector:
        text:
    duration:
      name: Duration
      description: Display duration in seconds (1-8), or 0 for persistent (until cleared).
      default: 3
      selector:
        number:
          min: 0
          max: 8
          mode: slider
    block_char:
      name: Block character
      description: Single character to render as block (█) in the message.
      selector:
        text:

show_osd_volume_bar:
  name: Show OSD volume bar
  description: Show a volume bar on the Lumagen OSD (scaled 0-80).
  fields:
    volume:
      name: Volume
      description: Volume level (0-100).
      required: true
      example: 63.5
      selector:
        number:
          min: 0
          max: 100
          step: 0.5
          mode: slider

clear_osd_message:
  name: Clear OSD message
  description: Clear any OSD message from the Lumagen.
