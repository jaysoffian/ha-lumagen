show_osd_message:
  name: Show OSD message
  description: Show an OSD message on the Lumagen.
  fields:
    device_id:
      name: Device
      description: The Lumagen device to target.
      required: true
      selector:
        device:
          integration: lumagen
    line_one:
      name: Line one
      description: First line of text (up to 30 chars).
      required: true
      example: "Hello World"
      selector:
        text:
    line_two:
      name: Line two
      description: Second line of text (up to 30 chars).
      example: "Second line"
      selector:
        text:
    duration:
      name: Duration
      description: Display duration in seconds (1-8), or 0 for persistent (until cleared).
      default: 3
      selector:
        number:
          min: 0
          max: 8
          mode: slider
    block_char:
      name: Block character
      description: Single character to render as block (█) in the message.
      selector:
        text:

show_osd_volume_bar:
  name: Show OSD volume bar
  description: Show a volume bar on the Lumagen OSD.
  fields:
    device_id:
      name: Device
      description: The Lumagen device to target.
      required: true
      selector:
        device:
          integration: lumagen
    level:
      name: Volume level
      description: Volume level (0.0–1.0).
      required: true
      example: 0.635
      selector:
        number:
          min: 0
          max: 1
          step: 0.005
          mode: slider
    label:
      name: Volume label
      description: Label (max 5 chars) to show in front of volume bar. Defaults to volume percentage (e.g "65.5%").
      example: "-16.5"
      selector:
        text:

clear_osd_message:
  name: Clear OSD message
  description: Clear any OSD message from the Lumagen.
  fields:
    device_id:
      name: Device
      description: The Lumagen device to target.
      required: true
      selector:
        device:
          integration: lumagen
